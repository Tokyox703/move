    <script>
        // Visitor Counter
        class VisitorCounter { constructor() { let v = localStorage.getItem('cinema4you_visitors'); if (!v) v = 0; this.visitors = parseInt(v); this.init(); } init() { const today = new Date().toDateString(); const last = localStorage.getItem('cinema4you_lastVisit'); if (last !== today) { this.visitors++; localStorage.setItem('cinema4you_visitors', this.visitors); localStorage.setItem('cinema4you_lastVisit', today); } document.getElementById('visitorCount').textContent = this.visitors.toLocaleString('ar-EG'); } } new VisitorCounter();

        // Countdown Manager
        let countdownInterval = null;
        let pendingUrl = null;
        
        function showCountdown(url, type) {
            pendingUrl = url;
            const modal = document.getElementById('countdownModal');
            const numberEl = document.getElementById('countdownNumber');
            const messageEl = document.getElementById('countdownMessage');
            
            let count = 5;
            numberEl.textContent = count;
            messageEl.innerHTML = type === 'watch' ? '🎬 جاري تجهير الفيديو للمشاهدة...' : '⬇️ جاري تجهير رابط التحميل...';
            modal.style.display = 'flex';
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                count--;
                numberEl.textContent = count;
                if (count <= 0) {
                    clearInterval(countdownInterval);
                    modal.style.display = 'none';
                    if (type === 'watch') {
                        window.open(pendingUrl, '_blank');
                        showToast('🎬 تم التوجيه إلى رابط المشاهدة');
                    } else {
                        window.location.href = pendingUrl;
                        showToast('⬇️ بدء التحميل...');
                    }
                    pendingUrl = null;
                }
            }, 1000);
        }
        
        function cancelCountdown() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            document.getElementById('countdownModal').style.display = 'none';
            pendingUrl = null;
            showToast('❌ تم إلغاء العملية');
        }
        
        document.getElementById('cancelCountdown')?.addEventListener('click', cancelCountdown);

        // Server Links
        const serverLinks = {
            1: { google: { watch: "https://drive.google.com/file/d/1VtL5Zu-GyFSY3_wESAXQ6y5kFWv__NdX/preview", download: "https://drive.google.com/uc?export=download&id=1VtL5Zu-GyFSY3_wESAXQ6y5kFWv__NdX" }, mixdrop: { watch: "https://mixdrop.top/e/ضع_الكود_هنا", download: "https://mixdrop.top/f/ضع_الكود_هنا" } },
            2: { google: { watch: "https://drive.google.com/file/d/16cW8PhYBZzSJyaJMXgk883iOhwfINy9s/preview", download: "https://drive.google.com/uc?export=download&id=16cW8PhYBZzSJyaJMXgk883iOhwfINy9s" }, mixdrop: { watch: "https://mixdrop.top/e/ضع_الكود_هنا", download: "https://mixdrop.top/f/ضع_الكود_هنا" } },

            5: { google: { watch: "https://drive.google.com/file/d/1CE3JpVwdcQQ6a1ju0vGPd7z_s77C2PK4/preview", download: "https://drive.google.com/uc?export=download&id=1CE3JpVwdcQQ6a1ju0vGPd7z_s77C2PK4" }, mixdrop: { watch: "https://mixdrop.top/f/l7qxrz94hqrx1rd", download: "https://mixdrop.top/f/l7qxrz94hqrx1rd" } },
            6: { google: { watch: "https://drive.google.com/file/d/1kHH9npqaXWVzkDvr86DiBSUszqTPSgfY/preview", download: "https://drive.google.com/uc?export=download&id=1kHH9npqaXWVzkDvr86DiBSUszqTPSgfY" }, mixdrop: { watch: "https://mixdrop.top/e/xwqz6w37t73mp8", download: "https://mixdrop.top/f/xwqz6w37t73mp8" } },
            7: { google: { watch: "https://drive.google.com/file/d/1H_fcJl7K0-TJ0qASd-Amb0PG0MyQSAvH/preview", download: "https://drive.google.com/uc?export=download&id=1H_fcJl7K0-TJ0qASd-Amb0PG0MyQSAvH" }, mixdrop: { watch: "https://mixdrop.top/e/ضع_الكود_هنا", download: "https://mixdrop.top/f/ضع_الكود_هنا" } },
            8: { google: { watch: "https://drive.google.com/file/d/1ehTt7v-kjr8og6sVNgz_CbbUSM1NzzyG/preview", download: "https://drive.google.com/uc?export=download&id=1ehTt7v-kjr8og6sVNgz_CbbUSM1NzzyG" }, mixdrop: { watch: "https://mixdrop.top/e/ضع_الكود_هنا", download: "https://mixdrop.top/f/ضع_الكود_هنا" } }
        };

        const movies = [
            { id: 1, title: "القط ذو الحذاء: الأمنية الأخيرة", titleEn: "Puss in Boots: The Last Wish", year: 2022, rating: 9.2, category: "animation", categoryAr: "أنميشن", poster: "https://upload.wikimedia.org/wikipedia/ar/0/06/Puss_in_Boots_The_Last_Wish.jpeg", plot: "فيلم مغامرة كوميدي مذهل. القط الأسطوري 'بوس' يكتشف أنه استنفذ 8 من أرواحه التسعة، ويبدأ رحلة ملحمية خطيرة عبر الغابة المظلمة للعثور على نجمة الأمنيات الأخيرة.", duration: 102 },
            { id: 2, title: "سحر الأقدار - Spellbound", titleEn: "Spellbound 2024", year: 2024, rating: 8.5, category: "animation", categoryAr: "أنميشن", poster: "https://m.media-amazon.com/images/M/MV5BYTU4NWFlMjEtZGFhMi00NzkxLWJkODQtOWExNDQ2NGVjM2RjXkEyXkFqcGc@._V1_.jpg", plot: "فيلم موسيقي ساحر. الأميرة 'إيليان' تعيش في مملكة لومبريا حيث يتحول والداها إلى وحوش. تنطلق في رحلة استثنائية لكسر التعويذة.", duration: 109 },
            { id: 3, title: "شمشون: نهاية العالم", titleEn: "Samson: End of the World", year: 2024, rating: 9.3, category: "scifi", categoryAr: "خيال علمي", poster: "https://upload.wikimedia.org/wikipedia/en/1/15/Plankton_The_Movie_poster.jpg", plot: "خيال علمي مثير. شاب يدعى شمشون يخترع رفيقة آلية فائقة الذكاء، لكنها تتحول إلى تهديد وجودي للبشرية.", duration: 118 },
            { id: 4, title: "سبونج بوب: الهولندي الطائر", titleEn: "SpongeBob: The Flying Dutchman", year: 2025, rating: 9.4, category: "animation", categoryAr: "أنميشن", poster: "https://rricoid-assets.obs.ap-southeast-4.myhuaweicloud.com/berita/Denpasar/o/1766129140956-the_spongebob_movie__search_for_squarepants_by_dbozartist_dh84eez-fullview/e2n06i60ikxs14u.jpeg", plot: "مغامرة جديدة ومضحكة تحت الماء. يقرر سبونج بوب مواجهة القرصان الهولندي الطائر لإنقاذ صديقهم.", duration: 95 },
            { id: 5, title: "الماعز: رحلة الأحلام", titleEn: "Mooz 2026", year: 2026, rating: 9.2, category: "animation", categoryAr: "أنميشن", poster: "https://upload.wikimedia.org/wikipedia/ar/b/be/%D9%85%D9%84%D8%B5%D9%82_%D9%81%D9%84%D9%85_%D8%A7%D9%84%D9%85%D8%A7%D8%B9%D8%B2.jpg", plot: "فيلم أنميشن ثلاثي الأبعاد مبهر. معزة صغيرة تحلم بأن تصبح بطلة خارقة، وتخوض مغامرة غير متوقعة عبر الزمن.", duration: 110 },
            { id: 6, title: "زوتوبيا 2: عودة الأبطال", titleEn: "Zootopia 2", year: 2026, rating: 9.5, category: "animation", categoryAr: "أنميشن", poster: "https://ksa.grandcinemasme.com/Media/resized-0a55f5e1-f2e0-432f-a78a-426b668020ce.jpg", plot: "المتابعة المنتظرة. تعود المحققة جودي هوبز وشريكها نيك وايلد في قضية جديدة غامضة تهدد السلام بين حيوانات المدينة.", duration: 118 },
            { id: 7, title: "الهجرة الكبرى", titleEn: "Migration", year: 2023, rating: 8.4, category: "animation", categoryAr: "أنميشن", poster: "https://images.justwatch.com/poster/338698547/s718/migration.jpg", plot: "كوميديا مغامرات. عائلة من البط البري تخوض أول رحلة هجرة لها من بركة صغيرة إلى جامايكا المشمسة.", duration: 92 },
            { id: 8, title: "السنافر: جزيرة الكنز", titleEn: "Smurfs 2025", year: 2025, rating: 8.7, category: "animation", categoryAr: "أنميشن", poster: "https://upload.wikimedia.org/wikipedia/ar/c/c5/%D9%85%D9%84%D8%B5%D9%82_%D9%81%D9%8A%D9%84%D9%85_%D8%A7%D9%84%D8%B3%D9%86%D8%A7%D9%81%D8%B1.png", plot: "مغامرة جديدة مع السنافر. يكتشفون خريطة قديمة تقودهم إلى جزيرة مليئة بالأسرار.", duration: 95 }
        ];

        function getMovieServers(movieId) { const links = serverLinks[movieId]; if (!links) return []; const servers = []; if (links.google && links.google.watch) servers.push({ name: "🎬 سيرفر Google Drive", icon: "fab fa-google-drive", watch: links.google.watch, download: links.google.download, color: "google" }); if (links.mixdrop && links.mixdrop.watch && !links.mixdrop.watch.includes("ضع_الكود_هنا")) servers.push({ name: "🎥 سيرفر MixDrop", icon: "fas fa-cloud-upload-alt", watch: links.mixdrop.watch, download: links.mixdrop.download, color: "mixdrop" }); return servers; }

        let userData = { favorites: [], watchlist: [], watched: [], defaultServer: {} };
        function loadUserData() { const saved = localStorage.getItem('cinema4you_userData'); if (saved) userData = JSON.parse(saved); if (!userData.defaultServer) userData.defaultServer = {}; }
        function saveUserData() { localStorage.setItem('cinema4you_userData', JSON.stringify(userData)); }
        function isFavorite(id) { return userData.favorites.includes(id); }
        function isInWatchlist(id) { return userData.watchlist.includes(id); }
        function isWatched(id) { return userData.watched.includes(id); }
        function toggleFavorite(id) { if (isFavorite(id)) userData.favorites = userData.favorites.filter(i => i !== id); else userData.favorites.push(id); saveUserData(); renderMovies(); showToast(isFavorite(id) ? "✅ أُضيف إلى المفضلة" : "❌ أُزيل من المفضلة"); }
        function toggleWatchlist(id) { if (isInWatchlist(id)) userData.watchlist = userData.watchlist.filter(i => i !== id); else userData.watchlist.push(id); saveUserData(); renderMovies(); showToast(isInWatchlist(id) ? "⏰ أُضيف للمشاهدة لاحقاً" : "❌ أُزيل"); }
        function markAsWatched(id) { if (!isWatched(id)) userData.watched.push(id); saveUserData(); showToast("🎬 تم تسجيل الفيلم كمشاهد"); }
        function showToast(message) { const toast = document.getElementById("toast"); toast.textContent = message; toast.style.display = "block"; setTimeout(() => toast.style.display = "none", 2500); }

        let currentMovies = [...movies], currentCategory = "all", currentSearch = "", currentPage = "home";
        const moviesGrid = document.getElementById("moviesGrid");
        
        function filterMovies() { let filtered = [...movies]; if (currentPage === "favorites") filtered = filtered.filter(m => userData.favorites.includes(m.id)); else if (currentPage === "watchlist") filtered = filtered.filter(m => userData.watchlist.includes(m.id)); else if (currentPage === "watched") filtered = filtered.filter(m => userData.watched.includes(m.id)); else { if (currentCategory !== "all") filtered = filtered.filter(m => m.category === currentCategory); if (currentSearch.trim()) filtered = filtered.filter(m => m.title.includes(currentSearch) || m.titleEn.includes(currentSearch)); } currentMovies = filtered; renderMovies(); }
        
        function renderMovies() { if (currentMovies.length === 0) { moviesGrid.innerHTML = `<div class="no-results" style="text-align: center; padding: 3rem; grid-column: 1/-1;">😢 لا توجد أفلام مطابقة</div>`; return; } moviesGrid.innerHTML = currentMovies.map(movie => `<div class="movie-card" data-id="${movie.id}"><div class="movie-poster"><img src="${movie.poster}" alt="${movie.title}" onerror="this.src='https://picsum.photos/300/450?grayscale'"><div class="movie-rating">⭐ ${movie.rating}</div><div class="movie-year">📅 ${movie.year}</div>${movie.rating >= 8.5 ? '<div class="movie-badge">🔥 الأكثر مشاهدة</div>' : ''}</div><div class="movie-actions"><button class="movie-action-btn" onclick="event.stopPropagation(); showMoviePage(${movie.id})"><i class="fas fa-play"></i></button><button class="movie-action-btn" onclick="event.stopPropagation(); toggleFavorite(${movie.id})"><i class="fas fa-heart ${isFavorite(movie.id) ? 'fas' : 'far'}"></i></button><button class="movie-action-btn" onclick="event.stopPropagation(); toggleWatchlist(${movie.id})"><i class="fas fa-clock ${isInWatchlist(movie.id) ? 'fas' : 'far'}"></i></button></div><div class="movie-info"><div class="movie-title">${movie.title}</div><div class="movie-category">${movie.categoryAr}</div></div></div>`).join(""); document.querySelectorAll(".movie-card").forEach(card => card.addEventListener("click", () => { const id = parseInt(card.dataset.id); if (id) showMoviePage(id); })); }

        let currentMovieServers = null, currentSelectedServerIndex = 0, currentMovieObj = null;
        const moviePageContainer = document.getElementById('moviePageContainer'), moviePageContent = document.getElementById('moviePageContent');
        
        function showMoviePage(movieId) { const movie = movies.find(m => m.id === movieId); if (!movie) return; currentMovieObj = movie; currentMovieServers = getMovieServers(movieId); if (currentMovieServers.length === 0) { showToast("⚠️ لا توجد سيرفرات متاحة حالياً"); return; } currentSelectedServerIndex = userData.defaultServer[movieId] || 0; if (currentSelectedServerIndex >= currentMovieServers.length) currentSelectedServerIndex = 0; document.body.classList.add('movie-page-open'); moviePageContainer.classList.add('show'); window.history.pushState({ movieId: movie.id }, '', `?movie=${movie.id}`); renderMoviePage(); document.body.style.overflow = 'hidden'; }
        
        function renderMoviePage() { const movie = currentMovieObj; const similarMovies = movies.filter(m => m.category === movie.category && m.id !== movie.id).slice(0, 6); const currentServer = currentMovieServers[currentSelectedServerIndex]; moviePageContent.innerHTML = `<div class="movie-page-header"><div class="movie-page-poster"><img src="${movie.poster}" alt="${movie.title}"></div><div class="movie-page-info"><h1 class="movie-page-title">${movie.title}</h1><div class="movie-page-meta"><span>📅 ${movie.year}</span><span>⭐ ${movie.rating}</span><span>🎬 ${movie.categoryAr}</span><span>⏱️ ${movie.duration} دقيقة</span></div><p class="movie-page-plot">${movie.plot}</p><div class="servers-section"><div class="servers-title"><i class="fas fa-server"></i> اختر السيرفر</div><div class="servers-buttons" id="serversButtons">${currentMovieServers.map((server, idx) => `<button class="server-btn ${idx === currentSelectedServerIndex ? 'active' : ''}" data-server-index="${idx}"><i class="${server.icon}"></i> ${server.name}</button>`).join('')}</div><div class="server-actions"><button class="watch-server-btn" id="watchServerBtn"><i class="fas fa-play"></i> مشاهدة الآن</button><button class="download-server-btn" id="downloadServerBtn"><i class="fas fa-download"></i> تحميل الفيلم</button></div></div></div></div>${similarMovies.length ? `<div class="similar-movies-section"><h3>🎬 أفلام مشابهة</h3><div class="similar-movies-grid">${similarMovies.map(m => `<div class="similar-movie-card" style="cursor:pointer;" onclick="showMoviePage(${m.id})"><img style="width:100%; aspect-ratio:2/3; object-fit:cover;" src="${m.poster}"><div style="padding:8px; text-align:center;">${m.title}</div></div>`).join('')}</div></div>` : ''}`; 
        
        document.querySelectorAll('.server-btn').forEach(btn => btn.addEventListener('click', (e) => { const idx = parseInt(btn.dataset.serverIndex); currentSelectedServerIndex = idx; userData.defaultServer[movie.id] = idx; saveUserData(); renderMoviePage(); })); 
        const watchBtn = document.getElementById('watchServerBtn'); if(watchBtn) watchBtn.addEventListener('click', () => { const server = currentMovieServers[currentSelectedServerIndex]; showCountdown(server.watch, 'watch'); markAsWatched(movie.id); }); 
        const downloadBtn = document.getElementById('downloadServerBtn'); if(downloadBtn) downloadBtn.addEventListener('click', () => { const server = currentMovieServers[currentSelectedServerIndex]; showCountdown(server.download, 'download'); }); }
        
        function goBackToHome() { document.body.classList.remove('movie-page-open'); moviePageContainer.classList.remove('show'); document.body.style.overflow = ''; window.history.pushState({}, '', window.location.pathname); }
        document.getElementById('backToHomeBtn')?.addEventListener('click', goBackToHome); window.addEventListener('popstate', () => goBackToHome());
        function checkUrlForMovie() { const params = new URLSearchParams(window.location.search); const movieId = params.get('movie'); if (movieId) setTimeout(() => showMoviePage(parseInt(movieId)), 100); }

        document.querySelectorAll(".nav-tab").forEach(tab => tab.addEventListener("click", () => { document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active")); tab.classList.add("active"); currentPage = tab.dataset.page; if (currentPage === "home") { currentCategory = "all"; document.querySelectorAll(".cat-btn").forEach(btn => { btn.classList.remove("active"); if (btn.dataset.cat === "all") btn.classList.add("active"); }); } currentSearch = ""; document.getElementById("searchInput").value = ""; filterMovies(); }));
        document.querySelectorAll(".cat-btn").forEach(btn => btn.addEventListener("click", () => { if (currentPage !== "home") { currentPage = "home"; document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active")); document.querySelector('.nav-tab[data-page="home"]').classList.add("active"); } document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); currentCategory = btn.dataset.cat; filterMovies(); }));
        document.getElementById("searchBtn")?.addEventListener("click", () => { if (currentPage !== "home") { currentPage = "home"; document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active")); document.querySelector('.nav-tab[data-page="home"]').classList.add("active"); currentCategory = "all"; document.querySelectorAll(".cat-btn").forEach(btn => { btn.classList.remove("active"); if (btn.dataset.cat === "all") btn.classList.add("active"); }); } currentSearch = document.getElementById("searchInput").value; filterMovies(); });
        document.getElementById("searchInput")?.addEventListener("keypress", e => { if (e.key === "Enter") document.getElementById("searchBtn").click(); });
        document.getElementById("themeToggle")?.addEventListener("click", () => { document.body.classList.toggle('dark-mode'); document.body.classList.toggle('light-mode'); });
        document.getElementById("fullscreenBtn")?.addEventListener("click", () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); });
        document.getElementById("scrollTop")?.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
        window.addEventListener("scroll", () => document.getElementById("scrollTop").classList.toggle("show", window.scrollY > 200));
        document.getElementById("logoRefresh")?.addEventListener("click", () => location.reload());
        document.getElementById("viewAllBtn")?.addEventListener("click", () => { currentCategory = "all"; document.querySelectorAll(".cat-btn").forEach(btn => { btn.classList.remove("active"); if (btn.dataset.cat === "all") btn.classList.add("active"); }); currentSearch = ""; document.getElementById("searchInput").value = ""; filterMovies(); window.scrollTo({ top: 600, behavior: "smooth" }); });
        
        loadUserData(); renderMovies(); checkUrlForMovie();
        
        function initParticles() { const container = document.getElementById("particleContainer"); for (let i = 0; i < 50; i++) { const p = document.createElement("div"); p.classList.add("particle"); p.style.width = `${Math.random() * 4 + 2}px`; p.style.height = p.style.width; p.style.left = `${Math.random() * 100}%`; p.style.animationDuration = `${Math.random() * 12 + 8}s`; p.style.animationDelay = `${Math.random() * 6}s`; p.style.background = `radial-gradient(circle, rgba(229,9,20,0.6), transparent)`; container.appendChild(p); } } initParticles();
    </script>
